<!-- PRISM Lab interactivity: scroll-reveal + back-to-top (progressive enhancement) -->
<script>
(function () {
  function ready(fn) {
    if (document.readyState !== "loading") { fn(); }
    else { document.addEventListener("DOMContentLoaded", fn); }
  }
  ready(function () {
    /* Scroll reveal — only engages when supported and motion is allowed, so
       content is never hidden for no-JS / reduced-motion users. */
    var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var selector = ".prism-card, .publication-item, .student-card, .prism-callout, " +
                   ".page__content > h2, .archive > h2, .teaching-table";
    var targets = Array.prototype.slice.call(document.querySelectorAll(selector));
    if ("IntersectionObserver" in window && !reduce && targets.length) {
      targets.forEach(function (el) { el.classList.add("prism-reveal"); });
      var io = new IntersectionObserver(function (entries, obs) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });
      targets.forEach(function (el) { io.observe(el); });
    }

    /* Back-to-top button */
    var btn = document.createElement("button");
    btn.className = "prism-top";
    btn.type = "button";
    btn.setAttribute("aria-label", "Back to top");
    btn.innerHTML = '<i class="fa-solid fa-arrow-up" aria-hidden="true"></i>';
    document.body.appendChild(btn);
    btn.addEventListener("click", function () {
      window.scrollTo({ top: 0, behavior: reduce ? "auto" : "smooth" });
    });
    var toggle = function () {
      if (window.pageYOffset > 400) { btn.classList.add("is-visible"); }
      else { btn.classList.remove("is-visible"); }
    };
    window.addEventListener("scroll", toggle, { passive: true });
    toggle();
  });
})();
</script>
